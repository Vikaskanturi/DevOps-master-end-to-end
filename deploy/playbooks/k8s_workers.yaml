- name: Join Worker Nodes
  hosts: k8s-workers
  become: true

  tasks:
    - name: Check if node already joined
      stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf

    - name: Copy join command
      copy:
        src: join-command.sh
        dest: /tmp/join.sh
        mode: 0755
      when: not kubelet_conf.stat.exists

    - name: Join cluster
      command: bash /tmp/join.sh
      when: not kubelet_conf.stat.exists
