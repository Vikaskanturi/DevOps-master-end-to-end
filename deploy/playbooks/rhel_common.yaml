- name: Setup Kubernetes With Common Configurations
  hosts: all
  become: true
  vars:
    kubernetes_version: "v1.29"
    project_path: "prerelease:/main"
    packages:
    - iproute-tc
    - git
  tasks:
    - name: Disable swap
      ansible.builtin.command:
        cmd: swapoff -a

    - name: Ensure swapoff at reboot (crontab)
      ansible.builtin.cron:
        name: "Ensure swapoff -a runs at reboot"
        job: "/sbin/swapoff -a"
        special_time: reboot
        state: present

    - name: Install required packages
      ansible.builtin.package:
        name: "{{ packages }}"
        state: present

    - name: Load kernel modules
      ansible.builtin.modprobe:
        name: "{{ item }}"
      loop:
        - overlay
        - br_netfilter

    - name: Ensure modules configured
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter
      notify: reload-modules

    - name: Ensure sysctl kernel params for k8s
      ansible.builtin.sysctl:
        name: net.bridge.bridge-nf-call-iptables
        value: 1
        state: present
        reload: yes

    - name: Ensure net.ipv4.ip_forward is enabled
      ansible.builtin.sysctl:
        name: net.ipv4.ip_forward
        value: 1
        state: present
        reload: yes

    - name: Disable SELinux enforcing mode
      ansible.builtin.command: setenforce 0
      ignore_errors: true

    - name: Ensure SELINUX is permissive in config
      ansible.builtin.replace:
        path: /etc/selinux/config
        regexp: '^SELINUX='
        replace: 'SELINUX=permissive'

    - name: Add Kubernetes repository file
      ansible.builtin.copy:
        dest: /etc/yum.repos.d/kubernetes.repo
        content: |
          [kubernetes]
          name=Kubernetes
          baseurl=https://pkgs.k8s.io/core:/stable:/{{ kubernetes_version }}/rpm/
          enabled=1
          gpgcheck=1
          gpgkey=https://pkgs.k8s.io/core:/stable:/{{ kubernetes_version }}/rpm/repodata/repomd.xml.key

    - name: Copy CRI-O rpm into place
      ansible.builtin.copy:
        src: cri-o-1.29.9~dev-150500.2.1.x86_64.rpm
        dest: /tmp/cri-o-1.29.9~dev-150500.2.1.x86_64.rpm

    - name: Install CRI-O package
      ansible.builtin.yum:
        name: /tmp/cri-o-1.29.9~dev-150500.2.1.x86_64.rpm
        state: present
        disable_gpg_check: yes

    - name: # Optional (safer): import CRI-O vendor GPG key before installing RPM
      ansible.builtin.shell: |
        # if you have a vendor GPG key URL, uncomment and set KEY_URL
        # rpm --import /tmp/cri-o-gpg.key || true
        true

    - name: Install Kubernetes packages
      ansible.builtin.package:
        name:
          - kubelet
          - kubeadm
          - kubectl
          - cri-tools
        state: present

    - name: Enable and start CRI-O
      ansible.builtin.service:
        name: crio
        state: started
        enabled: true

    - name: Enable and start kubelet
      ansible.builtin.service:
        name: kubelet
        state: started
        enabled: true

  handlers:
    - name: reload-modules
      ansible.builtin.command: sysctl --system
